server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # proxy API calls to the Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
