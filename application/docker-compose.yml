services:

  # ── Python YOLO inference (best.pt) ──────────────────────────────────────
  inference:
    build: ./inference-service
    environment:
      MODEL_PATH: /models/best.pt
      CONF_THRESH: "0.35"
    volumes:
      - ./models:/models:ro   # put best.pt in application/models/
    ports:
      - "9000:9000"

  # ── Spring Boot REST API ──────────────────────────────────────────────────
  backend:
    build: ./backend/crowdnav-api
    environment:
      APP_INFERENCE_MODE: remote
      APP_INFERENCE_BASE_URL: http://inference:9000
      APP_CORS_ALLOWED_ORIGINS: "http://localhost"
    ports:
      - "8080:8080"
    depends_on:
      - inference

  # ── React (Nginx) ─────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
