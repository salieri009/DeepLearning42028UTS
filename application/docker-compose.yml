# CrowdNav v2.5.0 — full stack (PostgreSQL + inference + Spring + React/Nginx)
# Run: docker compose up --build

services:

  # ── PostgreSQL (session persistence) ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crowdnav
      POSTGRES_USER: crowdnav
      POSTGRES_PASSWORD: crowdnav
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowdnav -d crowdnav"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Python YOLO inference (best.pt) ──────────────────────────────────────
  inference:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-inference:2.5.0
    build: ./inference-service
    environment:
      MODEL_PATH: /models/best.pt
      MODEL_PRECISE_PATH: /models/best.pt
      MODEL_NANO_PATH: yolov8n.pt
      CONF_THRESH: "0.35"
    volumes:
      - ./models:/models:ro
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Spring Boot REST API ──────────────────────────────────────────────────
  backend:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-backend:2.5.0
    build: ./backend/crowdnav-api
    environment:
      DB_URL: jdbc:postgresql://db:5432/crowdnav
      DB_USER: crowdnav
      DB_PASSWORD: crowdnav
      APP_INFERENCE_MODE: remote
      APP_INFERENCE_BASE_URL: http://inference:9000
      APP_CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:5173"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      inference:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── React (Nginx) ─────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-frontend:2.5.0
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  dbdata:
