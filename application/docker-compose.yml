services:

  # ── PostgreSQL (session persistence) ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crowdnav
      POSTGRES_USER: crowdnav
      POSTGRES_PASSWORD: crowdnav
    # No host port — DB reachable only on the compose network (backend → db:5432).
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowdnav -d crowdnav"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Python YOLO inference (best.pt) ──────────────────────────────────────
  inference:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-inference:latest
    build: ./inference-service          # fallback: build locally
    environment:
      MODEL_PATH: /models/best.pt
      CONF_THRESH: "0.35"
    volumes:
      - ./models:/models:ro             # place best.pt in application/models/
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Spring Boot REST API ──────────────────────────────────────────────────
  backend:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-backend:latest
    build: ./backend/crowdnav-api       # fallback: build locally
    environment:
      DB_URL: jdbc:postgresql://db:5432/crowdnav
      DB_USER: crowdnav
      DB_PASSWORD: crowdnav
      APP_INFERENCE_MODE: remote
      APP_INFERENCE_BASE_URL: http://inference:9000
      APP_CORS_ALLOWED_ORIGINS: "http://localhost"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      inference:
        condition: service_healthy

  # ── React (Nginx) ─────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-frontend:latest
    build: ./frontend                   # fallback: build locally
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  dbdata:
