server:
  port: 8080

spring:
  application:
    name: crowdnav-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crowdnav}
    username: ${DB_USER:crowdnav}
    password: ${DB_PASSWORD:crowdnav}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,inference
        liveness:
          include: livenessState
  health:
    readiness-state:
      enabled: true

# mock: static TechSpec-shaped response.
# remote (default): call Python inference at base-url via RestClient.
app:
  inference:
    mode: ${APP_INFERENCE_MODE:remote}
    base-url: ${APP_INFERENCE_BASE_URL:http://127.0.0.1:9000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8081}
  persistence:
    enabled: ${APP_PERSISTENCE_ENABLED:true}
