# Controller tests assert the deterministic mock response shape, so run the
# @SpringBootTest context in mock mode (the main default is `remote`, which would
# try to reach the FastAPI inference service on :9000 and fail in CI).
app.inference.mode=mock

spring.datasource.url=jdbc:h2:mem:crowdnav;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true
app.upload.max-frame-bytes=64
