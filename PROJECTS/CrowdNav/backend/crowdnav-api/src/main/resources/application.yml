server:
  port: 8080

spring:
  application:
    name: crowdnav-api

# mock: static TechSpec-shaped response.
# remote (future): call Python inference at base-url via WebClient.
app:
  inference:
    mode: mock
    base-url: http://127.0.0.1:9000
  cors:
    # Comma-separated list of allowed origins. Use * only for local dev.
    allowed-origins: "http://localhost:3000,http://localhost:8081"
