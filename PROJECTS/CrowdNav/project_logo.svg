<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft Gradients for warmth and accessibility -->
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4db8ff" /> <!-- Calming Teal/Blue -->
      <stop offset="100%" stop-color="#008080" /> <!-- Deeper Teal -->
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b" /> <!-- Soft Yellow -->
      <stop offset="100%" stop-color="#ffc107" /> <!-- Warmer Yellow -->
    </linearGradient>
  </defs>

  <!-- Background base: clean white circle -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" />
  
  <!-- Outer smooth circular boundary for tech/vision -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#circleGrad)" stroke-width="12" />

  <!-- Abstract rounded pathway sweeping upwards -->
  <path d="M 60 150 C 70 110, 80 100, 140 100" fill="none" stroke="url(#circleGrad)" stroke-width="14" stroke-linecap="round" />
  <path d="M 120 120 L 140 100 L 120 80" fill="none" stroke="url(#circleGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />

  <!-- The "Eye" (represents CV) floating above the path -->
  <ellipse cx="75" cy="75" rx="25" ry="18" fill="none" stroke="url(#eyeGrad)" stroke-width="8" />
  
  <!-- Pupil / Detection Node / Human element -->
  <circle cx="75" cy="75" r="8" fill="url(#eyeGrad)" />

</svg>
