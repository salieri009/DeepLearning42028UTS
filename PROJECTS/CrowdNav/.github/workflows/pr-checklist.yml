# =============================================================================
# PR Checklist Workflow (PR 체크리스트 자동 코멘트)
# =============================================================================
# 용도: PR이 새로 열릴 때 리뷰 체크리스트를 자동으로 코멘트로 작성합니다.
#   - 팀원이 PR을 리뷰할 때 참고할 항목들을 정리
#   - PR 품질 관리 및 코드 리뷰 프로세스 표준화
# =============================================================================

name: PR Checklist

# PR이 새로 열릴 때만 실행 (업데이트 시에는 실행하지 않음)
on:
  pull_request:
    types: [opened]
    branches:
      - main

# 권한 설정 — PR 코멘트 작성을 위해 write 권한 필요
permissions:
  contents: read
  pull-requests: write

jobs:
  post-checklist:
    name: Post Review Checklist
    runs-on: ubuntu-latest
    steps:
      # -----------------------------------------------------------------------
      # Step 1: PR에 체크리스트 코멘트 작성
      # 한국어(주) + 영어(보조) 체크리스트 항목
      # -----------------------------------------------------------------------
      - name: Post PR checklist comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## ✅ PR Checklist / PR 체크리스트

            Please review the following items before approving this PR:
            > PR 승인 전에 아래 항목들을 확인해주세요:

            - [ ] 기능이 의도한 대로 동작하는가? *(Does the feature work as intended?)*
            - [ ] 코딩 컨벤션을 따랐는가? *(Does it follow coding conventions?)*
            - [ ] 관련 테스트를 작성했는가? *(Have relevant tests been written?)*
            - [ ] 불필요한 주석/디버그 코드를 제거했는가? *(Have unnecessary comments/debug code been removed?)*
            - [ ] README 또는 문서 업데이트가 필요한가? *(Does README or documentation need updating?)*

            ---
            > 💡 Check off each item as you review. / 리뷰하면서 각 항목을 체크해주세요.
            > 🤖 *This checklist was automatically generated. / 이 체크리스트는 자동으로 생성되었습니다.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            console.log('✅ PR 체크리스트 코멘트가 작성되었습니다.');
