name: Build Check

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  python-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install black flake8 ruff mypy

      - name: Check formatting with Black
        run: |
          TARGETS=""
          if [ -d src ]; then
            TARGETS="$TARGETS src"
          fi
          if [ -d models ]; then
            TARGETS="$TARGETS models"
          fi
          if [ -n "$TARGETS" ]; then
            black --check $TARGETS
          else
            echo "No Python source directories found to format-check."
          fi

      - name: Lint with Flake8
        run: |
          TARGETS=""
          if [ -d src ]; then
            TARGETS="$TARGETS src"
          fi
          if [ -d models ]; then
            TARGETS="$TARGETS models"
          fi
          if [ -n "$TARGETS" ]; then
            flake8 $TARGETS --max-line-length=88
          else
            echo "No Python source directories found to lint."
          fi

      - name: Lint with Ruff
        run: |
          if [ -d src ]; then
            python -m ruff check src
          else
            echo "No src directory found to run Ruff."
          fi

      - name: Type check with Mypy (strict)
        run: |
          if [ -d src ]; then
            python -m mypy --strict src
          else
            echo "No src directory found to run Mypy."
          fi

