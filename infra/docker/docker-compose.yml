# =============================================================================
# Thin wrapper around the canonical stack in application/docker-compose.yml.
#
# Use this entry point when deploying from infra/ (e.g. after SageMaker training)
# and you want MODEL_DIR to point at extracted job weights instead of
# application/models/.
#
# Quick start:
#   cd infra/docker
#   cp .env.example .env    # optional — edit MODEL_DIR
#   docker compose up --build
#   → http://localhost
# =============================================================================

include:
  - path: ../../application/docker-compose.yml

services:
  inference:
    volumes:
      - ${MODEL_DIR:-../../application/models}:/models:ro
