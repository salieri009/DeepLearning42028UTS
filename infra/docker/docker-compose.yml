# =============================================================================
# CrowdNav v2.5.1 — thin wrapper (no PostgreSQL; session APIs need application stack)
# For full persistence use application/docker-compose.yml
#
# Run from infra/docker/:
#   MODEL_DIR=$PWD/../../application/models docker compose up --build
# =============================================================================

services:
  frontend:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-frontend:2.5.1
    build:
      context: ../../application/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: crowdnav_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-backend:2.5.1
    build:
      context: ../../application/backend/crowdnav-api
      dockerfile: Dockerfile
    container_name: crowdnav_backend
    depends_on:
      inference:
        condition: service_healthy
    environment:
      APP_INFERENCE_MODE: remote
      APP_INFERENCE_BASE_URL: http://inference:9000
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:8080"
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: docker
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  inference:
    image: ghcr.io/salieri009/deeplearning42028uts/crowdnav-inference:2.5.1
    build:
      context: ../../application/inference-service
      dockerfile: Dockerfile
    container_name: crowdnav_inference
    environment:
      MODEL_PATH: /opt/model/best.pt
      HOST: 0.0.0.0
      PORT: "9000"
    volumes:
      - "${MODEL_DIR:-../../application/models}:/opt/model:ro"
    expose:
      - "9000"
    restart: unless-stopped
