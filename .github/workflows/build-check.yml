name: Build Check

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  python-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: ./PROJECTS/CrowdNav
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8

      - name: Check formatting with Black
        working-directory: ./PROJECTS/CrowdNav
        run: black --check src models

      - name: Lint with Flake8
        working-directory: ./PROJECTS/CrowdNav
        run: flake8 src models --max-line-length=88

      # DVC / ClearML 환경 변수(Secret) 주입 가이드
      # GitHub Repository Settings > Secrets and variables > Actions에 아래 시크릿을 추가.
      # - name: Setup DVC and ClearML
      #   env:
      #     GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
      #     CLEARML_API_ACCESS_KEY: ${{ secrets.CLEARML_API_ACCESS_KEY }}
      #     CLEARML_API_SECRET_KEY: ${{ secrets.CLEARML_API_SECRET_KEY }}
      #     CLEARML_WEB_HOST: ${{ secrets.CLEARML_WEB_HOST }}
      #     CLEARML_API_HOST: ${{ secrets.CLEARML_API_HOST }}
      #     CLEARML_FILES_HOST: ${{ secrets.CLEARML_FILES_HOST }}
      #   run: |
      #     dvc pull
      #     # 필요 시 clearml-init 관련 스크립트 실행

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./PROJECTS/CrowdNav/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build
