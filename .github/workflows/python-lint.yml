# =============================================================================
# Python Lint Workflow (Python 코드 품질 검사)
# =============================================================================
# 용도: PR이 열리거나 업데이트될 때 Python 코드의 품질을 검사합니다.
#   1. Black으로 코드 포맷팅 검사 (포맷 안 맞으면 fail)
#   2. Flake8으로 코딩 컨벤션 체크
#   3. 검사 결과를 PR 코멘트로 자동 출력
# =============================================================================

name: Python Lint

# PR이 열리거나 업데이트될 때, Python 파일이 변경된 경우에만 실행
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - dev
    paths:
      - 'train/**/*.py'
      - 'application/**/*.py'
      - 'infra/**/*.py'

# 권한 설정 — PR 코멘트 작성을 위해 write 권한 필요
permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Python Code Quality Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./train
    steps:
      # -----------------------------------------------------------------------
      # Step 1: 리포지토리 체크아웃
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Python 환경 설정
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # -----------------------------------------------------------------------
      # Step 3: 린트 도구 설치
      # -----------------------------------------------------------------------
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      # -----------------------------------------------------------------------
      # Step 4: 검사 대상 디렉토리 확인
      # src/, models/ 디렉토리가 존재하는지 확인하여 타겟 설정
      # -----------------------------------------------------------------------
      - name: Determine target directories
        id: targets
        run: |
          TARGETS=""
          if [ -d src ]; then
            TARGETS="$TARGETS src"
          fi
          if [ -z "$TARGETS" ]; then
            TARGETS="."
          fi
          echo "dirs=$TARGETS" >> $GITHUB_OUTPUT
          echo "📁 검사 대상 디렉토리: $TARGETS"

      # -----------------------------------------------------------------------
      # Step 5: Black 포맷 검사
      # --check: 포맷이 맞지 않으면 exit 1
      # --diff: 어떤 부분이 틀린지 diff 출력
      # continue-on-error: 결과를 수집한 뒤 코멘트를 달기 위해 실패해도 계속 진행
      # -----------------------------------------------------------------------
      - name: Run Black format check
        id: black
        continue-on-error: true
        run: |
          echo "🖤 Black 포맷 검사를 실행합니다..."
          black --check --diff ${{ steps.targets.outputs.dirs }} 2>&1 | tee black_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Step 6: Flake8 린트 검사
      # --max-line-length=88: Black 기본값과 일치
      # --statistics: 에러 유형별 통계 출력
      # continue-on-error: 결과를 수집한 뒤 코멘트를 달기 위해 실패해도 계속 진행
      # -----------------------------------------------------------------------
      - name: Run Flake8 lint check
        id: flake8
        continue-on-error: true
        run: |
          echo "🔍 Flake8 린트 검사를 실행합니다..."
          flake8 ${{ steps.targets.outputs.dirs }} \
            --max-line-length=88 \
            --statistics \
            --count 2>&1 | tee flake8_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # Step 7: PR 코멘트로 결과 출력
      # Black과 Flake8의 결과를 하나의 코멘트로 요약
      # -----------------------------------------------------------------------
      - name: Comment lint results on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // 결과 파일 읽기
            let blackOutput = '';
            let flake8Output = '';
            try { blackOutput = fs.readFileSync('black_output.txt', 'utf8').trim(); } catch(e) {}
            try { flake8Output = fs.readFileSync('flake8_output.txt', 'utf8').trim(); } catch(e) {}

            const blackPassed = '${{ steps.black.outcome }}' === 'success';
            const flake8Passed = '${{ steps.flake8.outcome }}' === 'success';

            // 출력이 너무 길면 잘라내기 (GitHub 코멘트 제한)
            const truncate = (str, max = 3000) =>
              str.length > max ? str.substring(0, max) + '\n\n... (truncated / 이하 생략)' : str;

            const blackStatus = blackPassed ? '✅ Passed' : '❌ Failed';
            const flake8Status = flake8Passed ? '✅ Passed' : '❌ Failed';

            const body = `## 🔍 Python Lint Results / Python 린트 결과

            ### 🖤 Black (Code Formatting / 코드 포맷팅): ${blackStatus}
            ${blackPassed ? '> All files are properly formatted. / 모든 파일이 올바르게 포맷팅되어 있습니다.' : `
            <details>
            <summary>Click to expand Black output / Black 출력 보기</summary>

            \`\`\`diff
            ${truncate(blackOutput)}
            \`\`\`
            </details>

            > 💡 **Fix / 수정 방법:** Run \`black src models\` locally to auto-format.
            > 로컬에서 \`black src models\`을 실행하여 자동 포맷팅하세요.`}

            ### 🔎 Flake8 (Coding Conventions / 코딩 컨벤션): ${flake8Status}
            ${flake8Passed ? '> No linting issues found. / 린트 이슈가 없습니다.' : `
            <details>
            <summary>Click to expand Flake8 output / Flake8 출력 보기</summary>

            \`\`\`
            ${truncate(flake8Output)}
            \`\`\`
            </details>

            > 💡 **Fix / 수정 방법:** Review and fix the issues listed above.
            > 위 이슈들을 확인하고 수정해주세요.`}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      # -----------------------------------------------------------------------
      # Step 8: 최종 결과 판정
      # Black 또는 Flake8 중 하나라도 실패하면 워크플로우 실패 처리
      # -----------------------------------------------------------------------
      - name: Final status check
        if: steps.black.outcome == 'failure' || steps.flake8.outcome == 'failure'
        run: |
          echo "❌ 린트 검사에 실패했습니다. 위 코멘트를 확인하세요."
          echo "Black: ${{ steps.black.outcome }}"
          echo "Flake8: ${{ steps.flake8.outcome }}"
          exit 1
